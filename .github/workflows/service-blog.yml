name: Bi-Monthly Service Blog Post

on:
  schedule:
    # 1st and 15th of each month at 6 AM CT (12 PM UTC)
    - cron: '0 12 1,15 * *'
  workflow_dispatch:
    inputs:
      service:
        description: 'Override service (optional)'
        required: false
        type: string
      city:
        description: 'Override target city (optional)'
        required: false
        type: string
      dry_run:
        description: 'Generate locally only (no push)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  generate-service-post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate service blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: joelckeith-web
          GITHUB_REPO: blog.outdoor-renovations
          GITHUB_BRANCH: main
        run: |
          SERVICE_INPUT="${{ inputs.service }}"
          CITY_INPUT="${{ inputs.city }}"
          DRY_RUN="${{ inputs.dry_run }}"
          CMD="npx tsx scripts/generate-blog.ts --type service"
          if [ -n "$SERVICE_INPUT" ]; then
            CMD="$CMD --service \"$SERVICE_INPUT\""
          fi
          if [ -n "$CITY_INPUT" ]; then
            CMD="$CMD --city \"$CITY_INPUT\""
          fi
          if [ "$DRY_RUN" != "true" ]; then
            CMD="$CMD --push"
          fi
          echo "Running: $CMD"
          eval $CMD

      - name: Log result
        if: success()
        run: |
          echo "✅ Service blog post generated and published"
          echo "Posts in repo:"
          ls -la content/posts/ | tail -5

name: Weekly Storm Guide Update

# 2026-07-16: weather posts consolidated into the Central Texas storm prep
# guide. This workflow no longer creates posts — it patches the guide's
# CURRENT-CONDITIONS block in place via scripts/update-storm-guide.ts
# (tightened trigger: NWS watch/warning, 1.5"+ rain, or 40mph+ gusts).
on:
  schedule:
    # Monday 6 AM CT (12 PM UTC)
    - cron: '0 12 * * 1'
    # Thursday 6 AM CT (12 PM UTC)
    - cron: '0 12 * * 4'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Update locally only (no push)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-storm-guide:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Update storm guide current conditions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: joelckeith-web
          GITHUB_REPO: blog.outdoor-renovations
          GITHUB_BRANCH: main
        run: |
          DRY_RUN="${{ inputs.dry_run }}"
          CMD="npx tsx scripts/update-storm-guide.ts"
          if [ "$DRY_RUN" != "true" ]; then
            CMD="$CMD --push"
          fi
          echo "Running: $CMD"
          eval $CMD

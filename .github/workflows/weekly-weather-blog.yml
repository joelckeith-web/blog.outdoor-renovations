name: Weekly Weather Blog Posts

on:
  # PAUSED 2026-07-16: weather posts consolidated into the Central Texas storm
  # prep guide (content/posts/2026-07-16-central-texas-storm-prep-drainage-guide.md).
  # Re-enable only after the generator is rebuilt to patch the guide's
  # CURRENT-CONDITIONS section in place instead of creating new dated posts.
  # schedule:
  #   - cron: '0 12 * * 1'  # Monday 6 AM CT
  #   - cron: '0 12 * * 4'  # Thursday 6 AM CT
  workflow_dispatch:
    inputs:
      city:
        description: 'Override target city (optional)'
        required: false
        type: string
      dry_run:
        description: 'Generate locally only (no push)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  generate-weather-post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate weather blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: joelckeith-web
          GITHUB_REPO: blog.outdoor-renovations
          GITHUB_BRANCH: main
        run: |
          CITY_INPUT="${{ inputs.city }}"
          DRY_RUN="${{ inputs.dry_run }}"
          CMD="npx tsx scripts/generate-blog.ts --type weather"
          if [ -n "$CITY_INPUT" ]; then
            CMD="$CMD --city \"$CITY_INPUT\""
          fi
          if [ "$DRY_RUN" != "true" ]; then
            CMD="$CMD --push"
          fi
          echo "Running: $CMD"
          eval $CMD

      - name: Log result
        if: success()
        run: |
          echo "✅ Weather blog post generated and published"
          echo "Posts in repo:"
          ls -la content/posts/ | tail -5
